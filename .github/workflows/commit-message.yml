name: Commit Message Policy

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  validate-commit-messages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit subjects (Conventional Commits)
        shell: bash
        run: |
          set -euo pipefail

          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          pattern='^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([a-z0-9._/-]+\))?(!)?: .+$'

          bad=0
          while IFS= read -r subject; do
            [[ -z "$subject" ]] && continue
            if [[ "$subject" =~ ^Merge\  ]] || [[ "$subject" =~ ^Revert\ \" ]] || [[ "$subject" =~ ^fixup!\  ]] || [[ "$subject" =~ ^squash!\  ]]; then
              continue
            fi
            if [[ ! "$subject" =~ $pattern ]]; then
              echo "Invalid commit subject: $subject"
              bad=1
            fi
          done < <(git log --format=%s "${base_sha}..${head_sha}")

          if [[ "$bad" -ne 0 ]]; then
            echo "Commit message policy check failed."
            exit 1
          fi
